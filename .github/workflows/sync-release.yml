name: Sync Release to LSPosed

on:
  workflow_run:
    workflows: ["Build Release APK"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, for example 1-1.0.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          TAG=${INPUT_TAG:-"${VERSION_CODE}-${VERSION_NAME}"}

          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "No published source release found for $TAG; skipping sync."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Download source release
        if: steps.release.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          mkdir release
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.apk' --dir release
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body > release-notes.md

      - name: Publish LSPosed release
        if: steps.release.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION_NAME: ${{ steps.release.outputs.version_name }}
          TARGET_REPOSITORY: Xposed-Modules-Repo/moe.chenxy.huaweipods
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$TARGET_REPOSITORY" >/dev/null 2>&1; then
            echo "LSPosed release $TAG already exists; skipping."
            exit 0
          fi

          gh release create "$TAG" release/*.apk \
            --repo "$TARGET_REPOSITORY" \
            --target main \
            --title "$VERSION_NAME" \
            --notes-file release-notes.md \
            --latest
